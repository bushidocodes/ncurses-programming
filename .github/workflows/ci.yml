name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ncurses and tmux
        run: sudo apt-get install -y libncursesw5-dev tmux

      - name: Build
        run: make

      - name: TUI tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v


  sanitizers:
    name: Build under ASan + UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y clang libncursesw5-dev
      - name: Build with ASan+UBSan
        env:
          CC: clang
          CFLAGS: -O1 -g -Wall -fsanitize=address,undefined -fno-omit-frame-pointer
          LDFLAGS: -fsanitize=address,undefined
        run: make clean && make

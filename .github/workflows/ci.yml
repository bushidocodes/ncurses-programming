name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ncurses and tmux
        run: sudo apt-get install -y libncursesw5-dev tmux

      - name: Build
        run: make

      - name: TUI tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

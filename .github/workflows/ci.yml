name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    name: Build (warnings as errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ncurses
        run: sudo apt-get install -y libncursesw5-dev

      - name: Build
        run: make CFLAGS="-Wall -Wextra -Wno-unused-result -Wno-implicit-fallthrough -Werror"

  sanitizers:
    name: Build with ASan + UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ncurses
        run: sudo apt-get install -y libncursesw5-dev

      - name: Build
        run: make CFLAGS="-Wall -Wextra -Wno-unused-result -Wno-implicit-fallthrough -Werror -fsanitize=address,undefined -fno-omit-frame-pointer"
